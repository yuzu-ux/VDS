<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Deck seed — replace</title>
<style>
  :root {
    --bg: #faf9f5;
    --surface: #ffffff;
    --ink: #1f1e1d;
    --muted: #6e6a63;
    --line: #e4e0d7;
    --accent: #c15f3c;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #111; font: 16px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  .serif { font-family: "Iowan Old Style", Charter, Georgia, serif; }
  .mono  { font-family: "SF Mono", ui-monospace, Menlo, monospace; }

  .slide {
    width: 100vw; height: 100vh;
    background: var(--bg); color: var(--ink);
    display: none; flex-direction: column; justify-content: center;
    padding: 72px 96px; position: relative; overflow: hidden;
  }
  .slide.active { display: flex; }

  .slide .eyebrow { font-family: "SF Mono", ui-monospace, Menlo, monospace; font-size: 13px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--accent); margin-bottom: 20px; }
  .slide h1 { font-family: "Iowan Old Style", Charter, Georgia, serif; font-size: clamp(48px, 7vw, 88px); line-height: 1.04; font-weight: 500; letter-spacing: -0.02em; max-width: 18ch; }
  .slide h2 { font-family: "Iowan Old Style", Charter, Georgia, serif; font-size: clamp(34px, 4.5vw, 54px); line-height: 1.1; font-weight: 500; max-width: 24ch; margin-bottom: 28px; }
  .slide .lede { font-size: 22px; color: var(--muted); max-width: 46ch; margin-top: 20px; }
  .slide ul.points { margin-top: 28px; list-style: none; }
  .slide ul.points li { font-size: 20px; padding: 12px 0; border-top: 1px solid var(--line); max-width: 60ch; }
  .slide ul.points li::before { content: "—"; color: var(--accent); margin-right: 14px; }

  .cols { display: grid; grid-template-columns: 1fr 1fr; gap: 56px; align-items: center; }
  .stat-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 32px; margin-top: 40px; }
  .stat .num { font-family: "SF Mono", ui-monospace, Menlo, monospace; font-size: 56px; letter-spacing: -0.03em; }
  .stat .label { color: var(--muted); margin-top: 6px; }
  .ph-img { background: repeating-linear-gradient(45deg, var(--line) 0 1px, transparent 1px 12px), var(--surface); border: 1px solid var(--line); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: var(--muted); font-family: "SF Mono", ui-monospace, Menlo, monospace; font-size: 12px; min-height: 320px; }

  .slide.invert { background: var(--ink); color: var(--bg); }
  .slide.invert .lede { color: color-mix(in srgb, var(--bg) 70%, var(--ink)); }

  .footer-strip { position: absolute; left: 96px; right: 96px; bottom: 40px; display: flex; justify-content: space-between; font-family: "SF Mono", ui-monospace, Menlo, monospace; font-size: 12px; color: var(--muted); letter-spacing: 0.08em; }

  #counter { position: fixed; right: 24px; bottom: 20px; z-index: 10; font-family: "SF Mono", ui-monospace, Menlo, monospace; font-size: 12px; color: var(--muted); background: var(--surface); border: 1px solid var(--line); border-radius: 20px; padding: 6px 14px; }

  /* PDF export: one slide per page */
  @page { size: 1280px 800px; margin: 0; }
  @media print {
    body { background: none; }
    .slide { display: flex !important; width: 1280px; height: 800px; page-break-after: always; }
    #counter { display: none; }
  }
</style>
</head>
<body>
  <!-- SAMPLE SLIDES — replace. Keep data-uio-id, zero-padded. -->
  <section class="slide active" data-uio-id="slide-01">
    <div class="eyebrow">Company · 2026</div>
    <h1>The one-line thesis of this deck.</h1>
    <p class="lede">Presenter name · occasion · date.</p>
    <div class="footer-strip"><span>COMPANY</span><span>01 COVER</span></div>
  </section>

  <section class="slide invert" data-uio-id="slide-02">
    <div class="eyebrow">Problem</div>
    <h2>A full-bleed statement slide for the big claim.</h2>
    <div class="footer-strip"><span>COMPANY</span><span>02 PROBLEM</span></div>
  </section>

  <section class="slide" data-uio-id="slide-03">
    <div class="eyebrow">Traction</div>
    <h2>Numbers people remember.</h2>
    <div class="stat-row">
      <div class="stat"><div class="num">0.0×</div><div class="label">metric label</div></div>
      <div class="stat"><div class="num">00%</div><div class="label">metric label</div></div>
      <div class="stat"><div class="num">$0M</div><div class="label">metric label</div></div>
    </div>
    <div class="footer-strip"><span>COMPANY</span><span>03 TRACTION</span></div>
  </section>

<div id="counter">1 / 3</div>
<script>
  const slides = [...document.querySelectorAll('.slide')];
  let current = Math.max(0, slides.findIndex(s => s.classList.contains('active')));
  function show(idx) {
    current = Math.min(Math.max(idx, 0), slides.length - 1);
    slides.forEach((s, i) => s.classList.toggle('active', i === current));
    document.getElementById('counter').textContent = (current + 1) + ' / ' + slides.length;
  }
  addEventListener('keydown', (e) => {
    if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'PageDown') show(current + 1);
    if (e.key === 'ArrowLeft' || e.key === 'PageUp') show(current - 1);
    if (e.key === 'Home') show(0);
    if (e.key === 'End') show(slides.length - 1);
  });
  addEventListener('click', (e) => {
    if (e.clientX > innerWidth * 0.6) show(current + 1);
    else if (e.clientX < innerWidth * 0.25) show(current - 1);
  });
  show(current);
</script>
</body>
</html>
